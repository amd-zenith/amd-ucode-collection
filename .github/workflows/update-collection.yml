name: Update collection

on:
  schedule:
    # At 04:00 UTC on the 1st day of every month
    - cron: "0 4 1 * *"
  workflow_dispatch: {}

# Least privilege by default; the job below escalates only what it needs.
permissions: read-all

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install ZenScraper
        run: python -m pip install --upgrade pip zenscraper

      - name: Run ZenScraper
        run: zenscraper

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: patches
          branch: zenscraper/update-collection
          delete-branch: true
          commit-message: "Update collection"
          title: "Update collection"
          body: |
            Automated collection update produced by [ZenScraper](https://github.com/amd-zenith/zenscraper).

            This pull request was opened by the `Update collection` workflow because running ZenScraper changed the contents of `patches/`.
