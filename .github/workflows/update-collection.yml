name: Update collection

on:
  schedule:
    # Every day at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ZenScraper
        run: python -m pip install --upgrade pip zenscraper

      - name: Run ZenScraper
        run: zenscraper

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: patches
          branch: zenscraper/update-collection
          delete-branch: true
          commit-message: "Update collection"
          title: "Update collection"
          body: |
            Automated collection update produced by [ZenScraper](https://github.com/amd-zenith/zenscraper).

            This pull request was opened by the `Update collection` workflow because running ZenScraper changed the contents of `patches/`.
